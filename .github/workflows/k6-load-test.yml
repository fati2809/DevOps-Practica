name: K6 Load Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  k6-load-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Start application server
        run: |
          npm start &
          sleep 5
        env:
          PORT: 3000

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \\
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \\
            --keyserver hkp://keyserver.ubuntu.com:80 \\
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \\
            https://dl.k6.io/deb stable main" \\
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: Run K6 Load Tests
        run: |
          mkdir -p results
          k6 run \\
            --out json=results/k6-results.json \\
            --summary-export=results/k6-summary.json \\
            --out experimental-prometheus-rw \\
            tests/load-test.js
        env:
          BASE_URL: http://localhost:3000
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_PROMETHEUS_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}

      - name: Upload K6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-test-results
          path: results/
          retention-days: 30

      - name: Display test summary
        if: always()
        run: cat results/k6-summary.json
```

---

## 3. Integración GitHub + Grafana (pasos detallados)

### Paso 1 — Grafana Cloud
Entrar a [grafana.com/auth/sign-up](https://grafana.com/auth/sign-up) y crear una cuenta gratuita. Al terminar el registro te asigna automáticamente un stack con Prometheus incluido.

### Paso 2 — Obtener credenciales de Prometheus
Dentro de tu stack de Grafana Cloud ir a:
**Home → Connections → Data sources → grafanacloud-xxx-prom → Settings**

Ahí verás:
- **URL** del endpoint (algo como `https://prometheus-prod-xx.grafana.net/api/prom/push`)
- **Username** (un número, ej. `123456`)

Luego generar el token: **Home → My Account → API Keys → Add API Key** con el rol **MetricsPublisher**.

### Paso 3 — Secrets en GitHub
En tu repositorio ir a **Settings → Secrets and variables → Actions** y crear:

| Secret | Valor |
|---|---|
| `GRAFANA_PROMETHEUS_URL` | La URL del paso anterior |
| `GRAFANA_USERNAME` | El número de usuario |
| `GRAFANA_PASSWORD` | El API Token generado |

### Paso 4 — Dashboard en Grafana
Ir a **Dashboards → Import → ID: `2587`** → seleccionar tu datasource de Prometheus → **Import**. Este es el dashboard oficial de K6.

