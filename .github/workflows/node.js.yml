name: K6 Load Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Ajusta si tu server.js necesita 18

      - name: Install dependencies
        run: npm ci

      - name: Start API server
        run: |
          nohup node server.js > server.log 2>&1 &
          echo $! > server.pid
        env:
          PORT: 3000

      - name: Wait for API to be ready
        run: |
          for i in {1..60}; do
            if curl -s -f http://localhost:3000/health >/dev/null; then
              echo "API is ready!"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          echo "API failed to start"
          cat server.log
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.53.0'  # ← FIX AQUÍ (cambia a la versión actual si prefieres)

      - name: Run K6 Load Test
        uses: grafana/run-k6-action@v1
        with:
          path: load-test.js
        env:
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_URL }}
          K6_PROMETHEUS_RW_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
          BASE_URL: http://localhost:3000  # Si tu script lo usa
