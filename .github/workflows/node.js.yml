name: K6 Load Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-load-test:
    runs-on: ubuntu-latest
    env:
      RESULTS_DIR: results

    steps:
      # 1. Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 4. Iniciar el servidor
      - name: Start application server
        run: |
          npm start &
          sleep 5
        env:
          PORT: 3000

      # 5. Instalar K6
      - name: Install K6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xvz
          sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/k6

      # 6. Ejecutar tests de carga y generar resultados locales
      - name: Run K6 Load Tests (JSON)
        run: |
          set -e
          mkdir -p $RESULTS_DIR
          k6 run \
            --out json=$RESULTS_DIR/k6-results.json \
            --summary-export=$RESULTS_DIR/k6-summary.json \
            tests/load-test.js
        env:
          BASE_URL: http://localhost:3000

      # 7. Enviar métricas a Grafana/Prometheus
      - name: Export K6 metrics to Grafana/Prometheus
        run: |
          set -e
          PROM_URL="https://${GRAFANA_USERNAME}:${GRAFANA_PASSWORD}@${GRAFANA_PROMETHEUS_URL}"
          echo "Enviando métricas a Prometheus/Grafana en $PROM_URL"
          k6 run \
            --out experimental-prometheus-rw=$PROM_URL \
            tests/load-test.js
        env:
          BASE_URL: http://localhost:3000
          GRAFANA_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          GRAFANA_PROMETHEUS_URL: ${{ secrets.GRAFANA_PROMETHEUS_URL }}

      # 8. Subir resultados locales como artefactos
      - name: Upload K6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-test-results
          path: $RESULTS_DIR/
          retention-days: 30

      # 9. Mostrar resumen de prueba
      - name: Display test summary
        if: always()
        run: cat $RESULTS_DIR/k6-summary.json
