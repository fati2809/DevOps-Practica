name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Instalar dependencias del proyecto
      - name: Install dependencies
        run: npm install

      # 4️⃣ Iniciar el servidor API en segundo plano
      - name: Start API server
        run: |
          nohup node server.js > server.log 2>&1 &
          echo "Server started in background"
        env:
          PORT: 3000

      # 5️⃣ Esperar que la API esté lista
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/health; then
              echo "API ready!"
              break
            else
              echo "Waiting for API..."
              sleep 1
            fi
          done

      # 6️⃣ Ejecutar pruebas K6 usando la acción oficial de Grafana
      - name: Run K6 Load Test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: load-test.js
        env:
          # URL de Prometheus Remote Write de Grafana Cloud
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_URL }}
          # API key generada en Grafana Cloud
          K6_PROMETHEUS_RW_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
