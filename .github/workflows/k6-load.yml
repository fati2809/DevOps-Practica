name: K6 Load Test

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Ajusta a '18' si tu server.js lo requiere

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Iniciar el servidor en background
      - name: Start API server
        run: |
          nohup node server.js > server.log 2>&1 &
          echo $! > server.pid
        env:
          PORT: 3000

      # 5. Esperar que la API esté lista
      - name: Wait for API to be ready
        run: |
          for i in {1..60}; do
            if curl -s -f http://localhost:3000/health >/dev/null; then
              echo "API is ready!"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          echo "API failed to start after 120 seconds"
          cat server.log
          exit 1

      # 6. Instalar k6
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '0.53.0'  # Versión estable; puedes cambiar a 'latest' o '0.54.0'

      # 7. Ejecutar las pruebas y enviar a Grafana Cloud k6
      - name: Run K6 Load Test
        uses: grafana/run-k6-action@v1
        with:
          path: load-test.js
          cloud: true               # ← Envía resultados directamente a Grafana Cloud k6
        env:
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          BASE_URL: http://localhost:3000  # Si tu script lo usa (opcional)
