name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    services:
      api:
        image: node:18
        ports:
          - 3000:3000
        options: >-
          --workdir /app
          -v ${{ github.workspace }}:/app
        command: bash -c "npm install && node src/server.js"

    steps:
      # 1️⃣ Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4️⃣ Esperar a que la API esté lista
      - name: Wait for API
        uses: jakejarvis/wait-on@v0.1.0
        with:
          url: http://localhost:3000/health
          timeout: 30

      # 5️⃣ Ejecutar pruebas K6
      - name: Run K6 Load Test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: load-test.js
        env:
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_URL }}
          K6_PROMETHEUS_RW_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
