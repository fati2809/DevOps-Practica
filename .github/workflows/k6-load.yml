name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4️⃣ Iniciar el servidor API en background
      - name: Start API server
        run: |
          nohup npm run start > server.log 2>&1 &
          echo "Server started in background"
        env:
          PORT: 3000

      # 5️⃣ Esperar que la API esté lista
      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/health; then
              echo "API ready!"
              break
            else
              echo "Waiting for API..."
              sleep 1
            fi
          done

      # 6️⃣ Instalar K6
      - name: Install K6
        run: sudo apt-get update && sudo apt-get install -y k6

      # 7️⃣ Ejecutar pruebas K6 y enviar métricas a Grafana
      - name: Run K6 Load Test
        run: |
          k6 run load-test.js \
            --out experimental-prometheus-rw=${{ secrets.GRAFANA_URL }}:api_key=${{ secrets.GRAFANA_API_KEY }}
        env:
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
