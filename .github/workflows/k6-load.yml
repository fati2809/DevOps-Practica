name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4️⃣ Iniciar el servidor API
      - name: Start API server
        run: npm run start &
        env:
          PORT: 3000

      # 5️⃣ Esperar que la API esté lista
      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:3000/health; then
              echo "API ready!"
              break
            else
              echo "Waiting for API..."
              sleep 1
            fi
          done

      # 6️⃣ Ejecutar pruebas K6 y enviar métricas a Grafana Cloud
      - name: Run K6 Load Test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: load-test.js
        env:
          # URL de Grafana Cloud (Prometheus remote write)
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_URL }}
          # API Key de Grafana Cloud
          K6_PROMETHEUS_RW_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          # Habilitar métricas como histogramas nativos
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
