name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Start API server
        run: npm run start &   # o el comando que levanta tu API
        env:
          PORT: 3000

      - name: Wait for API
        run: sleep 5  # puedes aumentar si tu API tarda más en arrancar

      - name: Run K6 Load Test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: load-test.js
        env:
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_URL }}
          K6_PROMETHEUS_RW_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
