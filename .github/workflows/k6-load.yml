name: K6 Load Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Permite ejecución manual

jobs:
  k6-load-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalar Node.js y dependencias del proyecto
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      # 3. Iniciar el servidor de la aplicación en background
      - name: Start application server
        run: |
          npm start &
          sleep 5
        env:
          NODE_ENV: test
          PORT: 3000

      # 4. Instalar K6
      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \\
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \\
            --keyserver hkp://keyserver.ubuntu.com:80 \\
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \\
            https://dl.k6.io/deb stable main" \\
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      # 5. Ejecutar las pruebas de carga con K6
      - name: Run K6 Load Tests
        run: |
          k6 run \\
            --out json=results/k6-results.json \\
            --summary-export=results/k6-summary.json \\
            tests/load-test.js
        env:
          BASE_URL: http://localhost:3000
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_PROMETHEUS_URL }}
          K6_PROMETHEUS_RW_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          K6_PROMETHEUS_RW_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}

      # 6. Guardar resultados como artefacto descargable
      - name: Upload K6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-test-results
          path: results/
          retention-days: 30

      # 7. Mostrar resumen en el log de Actions
      - name: Display test summary
        if: always()
        run: |
          echo "===== RESUMEN DE PRUEBAS K6 ====="
          cat results/k6-summary.json || echo "No se generó el archivo de resumen"
