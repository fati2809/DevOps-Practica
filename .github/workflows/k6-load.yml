name: K6 Load Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Start API server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for API
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:3000/health; then
              echo "API ready!"
              break
            else
              echo "Waiting for API..."
              sleep 1
            fi
          done

      - name: Run K6 Load Test
        uses: grafana/k6-action@v0.2.0
        with:
          filename: load-test.js
        env:
          K6_PROMETHEUS_RW_SERVER_URL: ${{ secrets.GRAFANA_URL }}
          K6_PROMETHEUS_RW_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
          K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "true"
